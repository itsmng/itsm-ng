name: Functional Tests

on: [pull_request]

jobs:
  tests:
    name: Run functional tests (${{ matrix.db.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db:
          - image: mariadb:11.8
            label: MariaDB 11.8
            type: mysql
            port: 3306
            user: test
            tzinfo_cmd: mariadb-tzinfo-to-sql
            client_cmd: mariadb
            healthcheck: mariadb-admin ping
          - image: mysql:8.4
            label: MySQL 8.4
            type: mysql
            port: 3306
            user: test
            tzinfo_cmd: mysql_tzinfo_to_sql
            client_cmd: mysql
            healthcheck: mysqladmin ping
          - image: postgres:16
            label: PostgreSQL 16
            type: pgsql
            port: 5432
            user: postgres
            tzinfo_cmd: ""
            client_cmd: ""
            healthcheck: pg_isready -U postgres -d test_db
    env:
      DB_DATABASE: test_db
      DB_USER: ${{ matrix.db.user }}
      DB_PASSWORD: test
      DB_TYPE: ${{ matrix.db.type }}
      DB_HOST: 127.0.0.1:${{ matrix.db.port }}

    services:
      db:
        image: ${{ matrix.db.image }}
        ports:
          - "${{ matrix.db.port }}:${{ matrix.db.port }}"
        env:
          MYSQL_USER: ${{env.DB_USER}}
          MYSQL_PASSWORD: ${{env.DB_PASSWORD}}
          MYSQL_DATABASE: ${{env.DB_DATABASE}}
          MYSQL_ROOT_PASSWORD: ${{env.DB_PASSWORD}}
          POSTGRES_DB: ${{env.DB_DATABASE}}
          POSTGRES_USER: ${{env.DB_USER}}
          POSTGRES_PASSWORD: ${{env.DB_PASSWORD}}
        options: --health-cmd "${{ matrix.db.healthcheck }}" --health-interval 5s --health-timeout 3s --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: apcu, dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, pdo_pgsql, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run composer install
        run: export NODE_OPTIONS=--openssl-legacy-provider && php bin/console dependencies install

      - name: Load timezone data
        if: ${{ matrix.db.type == 'mysql' }}
        run: |
          DB_CONTAINER=$(docker ps -q --filter "publish=3306")
          docker exec "$DB_CONTAINER" \
            bash -c "${{ matrix.db.tzinfo_cmd }} /usr/share/zoneinfo | ${{ matrix.db.client_cmd }} -uroot -p${DB_PASSWORD} mysql"
          mysql -h 127.0.0.1 -u root -p$DB_PASSWORD \
            -e "GRANT SELECT ON mysql.time_zone_name TO '$DB_USER'@'%'; FLUSH PRIVILEGES;"

      - name: Install ITSM-ng
        run: php bin/console itsmng:database:install --config-dir=${{ github.workspace }}/tests/config --db-type=$DB_TYPE --db-host=$DB_HOST --db-user=$DB_USER --db-password=$DB_PASSWORD --db-name=$DB_DATABASE -n

      - name: Run functional tests
        run: vendor/bin/atoum -p 'php -d memory_limit=512M' --debug --force-terminal --use-dot-report --bootstrap-file tests/bootstrap.php --fail-if-skipped-methods --no-code-coverage --max-children-number 1 -d tests/functionnal
