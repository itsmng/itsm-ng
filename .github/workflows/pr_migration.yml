name: Test Migration

on: [pull_request]

jobs:
  tests:
    name: Run tests (${{ matrix.db.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db:
          - image: mariadb:11.8
            label: MariaDB 11.8
            type: mysql
            port: 3306
            user: itsm_migration
            healthcheck: mariadb-admin ping
          - image: mysql:8.4
            label: MySQL 8.4
            type: mysql
            port: 3306
            user: itsm_migration
            healthcheck: mysqladmin ping
          - image: postgres:16
            label: PostgreSQL 16
            type: pgsql
            port: 5432
            user: postgres
            healthcheck: pg_isready -U postgres -d itsm_migration
    env:
      DB_DATABASE: itsm_migration
      DB_USER: ${{ matrix.db.user }}
      DB_PASSWORD: itsm_migration
      DB_TYPE: ${{ matrix.db.type }}
      DB_HOST: 127.0.0.1:${{ matrix.db.port }}

    services:
      db:
        image: ${{ matrix.db.image }}
        ports:
          - "${{ matrix.db.port }}:${{ matrix.db.port }}"
        env:
          MYSQL_USER: ${{env.DB_USER}}
          MYSQL_PASSWORD: ${{env.DB_PASSWORD}}
          MYSQL_DATABASE: ${{env.DB_DATABASE}}
          MYSQL_ROOT_PASSWORD: ${{env.DB_PASSWORD}}
          POSTGRES_DB: ${{env.DB_DATABASE}}
          POSTGRES_USER: ${{env.DB_USER}}
          POSTGRES_PASSWORD: ${{env.DB_PASSWORD}}
        options: --health-cmd "${{ matrix.db.healthcheck }}" --health-interval 5s --health-timeout 3s --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, pdo_pgsql, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run composer / npm install
        run: export NODE_OPTIONS=--openssl-legacy-provider && php bin/console dependencies install

      - name: Seed legacy schema
        if: ${{ matrix.db.type == 'mysql' }}
        run: mysql -h 127.0.0.1 -P ${{ matrix.db.port }} -u $DB_USER -p$DB_PASSWORD $DB_DATABASE < tests/migrations/schema.sql

      - name: Prepare PostgreSQL schema for update smoke test
        if: ${{ matrix.db.type == 'pgsql' }}
        run: php bin/console itsmng:database:install --config-dir=${{ github.workspace }}/tests/migrations --reconfigure --db-type=$DB_TYPE --db-host=$DB_HOST --db-user=$DB_USER --db-password=$DB_PASSWORD --db-name=$DB_DATABASE -n

      - name: Run migration tests
        run: php bin/console itsmng:database:update --config-dir=${{ github.workspace }}/tests/migrations -n
